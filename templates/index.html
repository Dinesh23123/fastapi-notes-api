<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>iNotes - Take your notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>Hello, world!</h1>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">iNotes</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>




     <div class="container">
       
        <h1>Start adding your notes</h1>

<form method="post">
  <div class="mb-3">
    <label for="Title" class="form-label">Note Title</label>
    <input type="text" class="form-control" id="title" name="title" aria-describedby="title">
  </div>
  <div class="mb-3">
    <label for="Description" class="form-label">Description</label>
    <input type="text" class="form-control" id="desc" name="desc">
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" name="important" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">Check me out</label>
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
     </div>

     <div class="container">
        <h2>Your Notes</h2>
        
        {% if not newDocs %}
        No notes to display
{% endif %}


        {% for item in newDocs %}
        <div class="card mb-3">
          <div class="card-body">
            <h5 class="card-title">
              {{ item.title }}
              {% if item.important %}
              <span class="badge bg-success">Important</span>
              {% endif %}
            </h5>
            <p class="card-text">{{ item.desc }}</p>
            <button class="btn btn-sm btn-warning" 
                    data-id="{{ item.id }}" 
                    data-title="{{ item.title }}" 
                    data-desc="{{ item.desc }}" 
                    data-important="{{ item.important }}" 
                    onclick="openEditModal(this)">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteNote('{{ item.id }}')">Delete</button>
          </div>
        </div>
    {% endfor %}
     </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="editModalLabel">Edit Note</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editForm">
              <div class="mb-3">
                <label for="editTitle" class="form-label">Note Title</label>
                <input type="text" class="form-control" id="editTitle" name="title" required>
              </div>
              <div class="mb-3">
                <label for="editDesc" class="form-label">Description</label>
                <input type="text" class="form-control" id="editDesc" name="desc">
              </div>
              <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" name="important" id="editImportant">
                <label class="form-check-label" for="editImportant">Mark as Important</label>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="saveNote()">Save Changes</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
      let currentEditId = null;
      let editModal = null;

      function openEditModal(btn) {
        currentEditId = btn.getAttribute('data-id');
        document.getElementById('editTitle').value = btn.getAttribute('data-title');
        document.getElementById('editDesc').value = btn.getAttribute('data-desc');
        document.getElementById('editImportant').checked = btn.getAttribute('data-important') === 'True';
        
        if (!editModal) {
          editModal = new bootstrap.Modal(document.getElementById('editModal'));
        }
        editModal.show();
      }

      async function saveNote() {
        const formData = new FormData(document.getElementById('editForm'));
        
        try {
          const response = await fetch(`/${currentEditId}`, {
            method: 'PUT',
            body: formData
          });
          
          const result = await response.json();
          
          if (result.Success) {
            editModal.hide();
            // Reload the page to see updates
            window.location.reload();
          } else {
            alert('Error updating note');
          }
        } catch (error) {
          console.error('Error:', error);
          alert('Error updating note');
        }
      }

      async function deleteNote(id) {
        if (confirm('Are you sure you want to delete this note?')) {
          try {
            const response = await fetch(`/${id}`, {
              method: 'DELETE'
            });
            
            const result = await response.json();
            
            if (result.Success) {
              window.location.reload();
            } else {
              alert('Error deleting note');
            }
          } catch (error) {
            console.error('Error:', error);
            alert('Error deleting note');
          }
        }
      }
    </script>

</body>
</html>
